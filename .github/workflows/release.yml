name: Release (cargo-dist)
permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  dist:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-dist
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.30.0/cargo-dist-installer.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          which dist
          dist --version

      - name: Setup Node for UI build
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test before packaging
        run: |
          cd frontend && npm ci && npm run build
          cd ../api && cargo test --all

      - name: Build and package with cargo-dist
        working-directory: ./api
        env:
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: -Cstrip=symbols
        run: |
          dist build --output-format=json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metta-kg-${{ matrix.os }}
          path: api/target/dist/*

  publish:
    needs: dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        env:
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          gh release create "${GITHUB_REF##*/}" --target "$RELEASE_COMMIT" --notes "Release $GITHUB_REF" dist/*
