# cargo-dist configuration for MeTTa-KG single-binary distribution

[workspace]
# Installers to build
installers = ["shell", "powershell", "msi", "pkg", "deb", "appimage"]

# Build targets for macOS, Linux, Windows
targets = [
  "x86_64-unknown-linux-gnu",
  "x86_64-unknown-linux-musl",
  "aarch64-unknown-linux-gnu",
  "x86_64-pc-windows-msvc",
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
]

# Enable updater
updater = true

# Package configuration
[package]
name = "metta-kg"
features = []
artifacts = ["bin:metta-kg"]
