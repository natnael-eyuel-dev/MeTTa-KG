# cargo-dist configuration for MeTTa-KG single-binary distribution

[workspace]
installers = ["shell", "powershell", "msi", "pkg", "deb", "appimage"]

[dist]
targets = [
  "x86_64-unknown-linux-gnu",
  "x86_64-unknown-linux-musl",
  "aarch64-unknown-linux-gnu",
  "x86_64-pc-windows-msvc",
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
]

[release]
updater = true
