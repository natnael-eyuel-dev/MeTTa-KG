services:
  api:
    build: .
    image: metta-kg:dev
    ports:
      - "${METTA_KG_PORT:-3030}:${METTA_KG_PORT:-3030}"
    depends_on:
      - db
      - mork
    environment:
      DOCKER: "1"
      METTA_KG_DATABASE_URL: ${METTA_KG_DATABASE_URL}
      METTA_KG_SECRET: ${METTA_KG_SECRET}
      METTA_KG_MORK_URL: ${METTA_KG_MORK_URL}
      METTA_KG_ORIGIN_URL: ${METTA_KG_ORIGIN_URL}
      ROCKET_ADDRESS: ${METTA_KG_ADDRESS:-0.0.0.0}
      ROCKET_PORT: ${METTA_KG_PORT:-3030}
    command: ["/usr/local/bin/metta-kg", "--address", "0.0.0.0", "--port", "${METTA_KG_PORT:-3030}"]
  db:
    image: "postgres"
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      ADMINER_DEFAULT_DB_DRIVER: pgsql
      ADMINER_DEFAULT_DB_HOST: db
      ADMINER_DEFAULT_DB_NAME: ${POSTGRES_DB}
  mork:
    build:
      context: .
      dockerfile: Dockerfile.mork
    ports:
      - "8001:8001"
    environment:
      MORK_SERVER_ADDR: ${MORK_SERVER_ADDR}
      MORK_SERVER_PORT: ${MORK_SERVER_PORT}